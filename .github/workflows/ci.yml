name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: scrum_board
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      NODE_ENV: test
      PORT: 5001
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: scrum_board
      DB_PORT: 3306
      JWT_SECRET: ci_super_secret_change_me_1234567890
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install mysql client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Prepare database schema and seed
        run: |
          mysql -h 127.0.0.1 -uroot -proot scrum_board < backend/database/schema.sql
          mysql -h 127.0.0.1 -uroot -proot scrum_board < backend/database/seeds.sql

      - name: Run migrations
        working-directory: backend
        run: npm run migrate

      - name: Authorization smoke tests
        working-directory: backend
        run: npm run test:authz

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build frontend
        working-directory: frontend
        run: npm run build
